version: "3.9"

# Production override — builds optimized frontend with nginx
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up --build

services:
  backend:
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8085", "--workers", "2"]
    volumes:
      - ./knowledge:/app/knowledge

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: prod
    ports:
      - "8080:80"
    volumes: []
